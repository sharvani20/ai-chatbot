<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Chatbot</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0b0f1a;
      --surface:   #111827;
      --card:      #1a2235;
      --border:    #2a3a55;
      --accent:    #00e5ff;
      --accent2:   #7b61ff;
      --user-bg:   #1e3a5f;
      --bot-bg:    #1a2235;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --danger:    #ff4d6d;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
    }

    /* ── noise overlay ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0;
    }

    /* ── header ── */
    header {
      width: 100%; max-width: 780px;
      padding: 28px 24px 16px;
      display: flex; align-items: center; gap: 14px;
      position: relative; z-index: 1;
    }
    .logo {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,229,255,0.25);
    }
    header h1 {
      font-family: 'Space Mono', monospace;
      font-size: 1.1rem; font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    header p { font-size: 0.78rem; color: var(--muted); margin-top: 2px; }
    .status-dot {
      margin-left: auto;
      display: flex; align-items: center; gap: 6px;
      font-size: 0.75rem; color: var(--muted);
    }
    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22c55e;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }

    /* ── chat window ── */
    #chat-window {
      width: 100%; max-width: 780px;
      flex: 1;
      overflow-y: auto;
      padding: 8px 24px 120px;
      display: flex; flex-direction: column; gap: 14px;
      position: relative; z-index: 1;
      scroll-behavior: smooth;
    }
    #chat-window::-webkit-scrollbar { width: 4px; }
    #chat-window::-webkit-scrollbar-track { background: transparent; }
    #chat-window::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── messages ── */
    .msg {
      display: flex; gap: 10px; max-width: 78%;
      animation: fadeUp 0.25s ease forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot  { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px; border-radius: 10px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; margin-top: 2px;
    }
    .msg.user .avatar { background: var(--user-bg); border: 1px solid #2a4a7f; }
    .msg.bot  .avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }

    .bubble {
      padding: 12px 16px; border-radius: 16px;
      font-size: 0.92rem; line-height: 1.6;
      max-width: 100%;
    }
    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid #2a4a7f;
      border-bottom-right-radius: 4px;
      color: #bfdbfe;
    }
    .msg.bot .bubble {
      background: var(--card);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
      color: var(--text);
    }
    .timestamp {
      font-size: 0.67rem; color: var(--muted);
      margin-top: 4px; padding: 0 4px;
    }
    .msg.user .timestamp { text-align: right; }

    /* ── typing indicator ── */
    #typing {
      display: none; align-self: flex-start;
      align-items: center; gap: 10px;
    }
    #typing .avatar { background: linear-gradient(135deg,var(--accent),var(--accent2)); }
    .dots { display: flex; gap: 5px; padding: 12px 16px; background: var(--card); border-radius: 16px; border-bottom-left-radius:4px; border:1px solid var(--border); }
    .dots span {
      width: 7px; height: 7px; border-radius: 50%; background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .dots span:nth-child(2){animation-delay:.2s}
    .dots span:nth-child(3){animation-delay:.4s}
    @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

    /* ── input bar ── */
    #input-bar {
      position: fixed; bottom: 0;
      width: 100%; max-width: 780px;
      padding: 16px 24px 24px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      z-index: 10;
    }
    .input-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 8px 8px 18px;
      transition: border-color .2s;
    }
    .input-wrap:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
    #user-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.92rem; color: var(--text);
      resize: none; max-height: 120px; min-height: 24px;
      line-height: 1.5;
    }
    #user-input::placeholder { color: var(--muted); }
    #send-btn {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; transition: opacity .15s, transform .15s;
      color: #0b0f1a;
    }
    #send-btn:hover { opacity: .88; transform: scale(1.05); }
    #send-btn:disabled { opacity: .35; cursor: not-allowed; transform: none; }

    .hint {
      text-align: center; font-size: 0.7rem; color: var(--muted);
      margin-top: 8px;
    }

    /* ── welcome card ── */
    .welcome {
      align-self: center; text-align: center;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 20px; padding: 32px 28px; max-width: 420px;
      margin-top: 40px;
    }
    .welcome .icon { font-size: 2.4rem; margin-bottom: 12px; }
    .welcome h2 { font-family: 'Space Mono', monospace; font-size: 1rem; margin-bottom: 8px; }
    .welcome p  { font-size: 0.85rem; color: var(--muted); line-height: 1.6; }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 16px; }
    .chip {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 14px;
      font-size: 0.78rem; color: var(--accent);
      cursor: pointer; transition: background .15s;
    }
    .chip:hover { background: var(--border); }
  </style>
</head>
<body>

<header>
  <div class="logo">🤖</div>
  <div>
    <h1>NeuralChat</h1>
    <p>Powered by DialoGPT + FastAPI</p>
  </div>
  <div class="status-dot"><span class="dot"></span>Online</div>
</header>

<div id="chat-window">
  <div class="welcome" id="welcome-card">
    <div class="icon">✨</div>
    <h2>Hello! I'm your AI assistant.</h2>
    <p>Ask me anything — I use DialoGPT to hold a natural conversation and remember context across turns.</p>
    <div class="chips">
      <span class="chip" onclick="quickSend(this)">What can you do?</span>
      <span class="chip" onclick="quickSend(this)">Tell me a fun fact</span>
      <span class="chip" onclick="quickSend(this)">How does NLP work?</span>
    </div>
  </div>

  <div class="msg bot" id="typing" style="display:none">
    <div class="avatar">🤖</div>
    <div class="dots">
      <span></span><span></span><span></span>
    </div>
  </div>
</div>

<div id="input-bar">
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Type a message…"></textarea>
    <button id="send-btn" onclick="sendMessage()">➤</button>
  </div>
  <p class="hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</p>
</div>

<script>
  const API = "https://ai-chatbot-fvzw.onrender.com";
  let sessionId = null;

  const chatWindow = document.getElementById("chat-window");
  const input      = document.getElementById("user-input");
  const sendBtn    = document.getElementById("send-btn");
  const typing     = document.getElementById("typing");

  // Auto-resize textarea
  input.addEventListener("input", () => {
    input.style.height = "auto";
    input.style.height = input.scrollHeight + "px";
  });

  // Enter = send, Shift+Enter = newline
  input.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function quickSend(el) {
    input.value = el.textContent;
    sendMessage();
  }

  function appendMsg(text, role, ts) {
    const welcome = document.getElementById("welcome-card");
    if (welcome) welcome.remove();

    const time = ts
      ? new Date(ts).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})
      : new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});

    const div = document.createElement("div");
    div.className = `msg ${role}`;
    div.innerHTML = `
      <div class="avatar">${role === "user" ? "🧑" : "🤖"}</div>
      <div>
        <div class="bubble">${text}</div>
        <div class="timestamp">${time}</div>
      </div>`;

    chatWindow.insertBefore(div, typing);
    chatWindow.scrollTop = chatWindow.scrollHeight;
  }

  async function sendMessage() {
    const msg = input.value.trim();
    if (!msg) return;

    appendMsg(msg, "user");
    input.value = "";
    input.style.height = "auto";
    sendBtn.disabled = true;
    typing.style.display = "flex";
    chatWindow.scrollTop = chatWindow.scrollHeight;

    try {
      const res = await fetch(`${API}/chat`, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ message: msg, session_id: sessionId })
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);
      const data = await res.json();
      sessionId = data.session_id;
      typing.style.display = "none";
      appendMsg(data.reply, "bot", data.timestamp);
    } catch (err) {
      typing.style.display = "none";
      appendMsg(`⚠️ Could not connect to the API. Make sure the server is running at <code>${API}</code>`, "bot");
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }
</script>
</body>
</html>
